<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>飞书授权回调</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			background-color: #f5f6f7;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
		}
		.container { text-align: center; padding: 40px 20px; }
		.spinner {
			width: 40px; height: 40px;
			border: 3px solid #e5e6eb;
			border-top: 3px solid #3370ff;
			border-radius: 50%;
			animation: spin 0.8s linear infinite;
			margin: 0 auto 20px;
		}
		@keyframes spin {
			0% { transform: rotate(0deg); }
			100% { transform: rotate(360deg); }
		}
		.message { font-size: 16px; color: #666; }
		.error { color: #f53f3f; }
	</style>
</head>
<body>
	<div class="container">
		<div class="spinner" id="spinner"></div>
		<p class="message" id="message">正在处理授权，请稍候...</p>
	</div>

	<!-- 引入 uni-app 的 webview SDK，用于 postMessage -->
	<script type="text/javascript" src="https://js.cdn.aliyun.dcloud.net/dev/uni-app/uni.webview.1.5.2.js"></script>

	<script>
		/**
		 * 飞书授权回调页面
		 *
		 * 流程：
		 * 1. 用户在飞书授权页面点击「授权」
		 * 2. 飞书重定向到此页面，URL 中携带 code 参数
		 * 3. 此页面解析 URL 中的 code
		 * 4. 通过 uni.postMessage 将 code 传递给 App 端
		 * 5. App 端 web-view 组件的 @message 事件接收到 code
		 */

		// 解析 URL 查询参数
		function getQueryParams() {
			var params = {};
			var search = window.location.search.substring(1);
			if (!search) return params;

			var pairs = search.split('&');
			for (var i = 0; i < pairs.length; i++) {
				var pair = pairs[i].split('=');
				var key = decodeURIComponent(pair[0]);
				var value = pair.length > 1 ? decodeURIComponent(pair[1]) : '';
				params[key] = value;
			}
			return params;
		}

		// 等待 uni.webview SDK 加载完成
		document.addEventListener('UniAppJSBridgeReady', function() {
			console.log('[Callback] UniAppJSBridgeReady');

			var params = getQueryParams();
			var code = params.code;
			var state = params.state;
			var error = params.error;

			console.log('[Callback] URL params:', JSON.stringify(params));

			if (error) {
				// 授权失败
				document.getElementById('spinner').style.display = 'none';
				document.getElementById('message').className = 'message error';
				document.getElementById('message').textContent = '授权失败: ' + error;

				uni.postMessage({
					data: {
						type: 'feishu_auth_error',
						message: error
					}
				});

				setTimeout(function() {
					uni.navigateBack({ delta: 1 });
				}, 2000);
				return;
			}

			if (code) {
				// 授权成功，拿到 code
				document.getElementById('message').textContent = '授权成功，正在登录...';

				console.log('[Callback] 发送 code 给 App:', code);

				// 通过 postMessage 把 code 传递给 App 端
				uni.postMessage({
					data: {
						type: 'feishu_auth_code',
						code: code,
						state: state || ''
					}
				});

				// 触发返回，此时 @message 事件会被触发
				setTimeout(function() {
					uni.navigateBack({ delta: 1 });
				}, 500);
			} else {
				// 没有 code 也没有 error
				document.getElementById('spinner').style.display = 'none';
				document.getElementById('message').className = 'message error';
				document.getElementById('message').textContent = '未获取到授权信息，请重试';

				uni.postMessage({
					data: {
						type: 'feishu_auth_error',
						message: '未获取到授权码'
					}
				});

				setTimeout(function() {
					uni.navigateBack({ delta: 1 });
				}, 2000);
			}
		});
	</script>
</body>
</html>
